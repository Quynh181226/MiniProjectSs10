<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" >
<head>
    <title>Hệ thống Quản lý Thiết bị IT</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        .navbar-dark .nav-link { color: rgba(255,255,255,.8); }
        .navbar-dark .nav-link:hover { color: #fff; }
        .bg-primary-custom { background-color: #004085 !important; }
        /* Nút đăng xuất tối giản trên Header */
        .btn-header-logout {
            border-radius: 20px;
            font-size: 0.85rem;
            /* Ép màu chữ trắng ngay từ đầu */
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s;
        }

        .btn-header-logout:hover {
            background-color: #dc3545;
            /* Vẫn giữ màu chữ trắng khi di chuột vào */
            color: white !important;
            border-color: #dc3545;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Đảm bảo icon bên trong cũng màu trắng */
        .btn-header-logout i {
            color: white !important;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    <header class="bg-primary-custom text-white py-4 shadow-sm">
        <div class="container position-relative">
            <div class="position-absolute" style="top: 0; right: 15px;">
                <a th:href="@{/auth/logout}" class="btn btn-header-logout">
                    <i class="bi bi-box-arrow-right mr-1"></i> Đăng xuất
                </a>
            </div>

            <div class="text-center">
                <h1 class="display-5 fw-bold mb-1 text-white">
                    <i class="bi bi-pc-display-horizontal"></i> IT-LAB
                </h1>
                <p class="text-white fst-italic mb-0" style="opacity: 0.9;">
                    Quản lý thiết bị thông minh - Hỗ trợ học tập tối ưu
                </p>
            </div>
        </div>
    </header>


    <main class="container my-5 flex-grow-1">
        <div layout:fragment="content">
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-1">&copy; 2026 Hệ thống quản lý thiết bị <strong>IT-LAB</strong>.</p>
        </div>
    </footer>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
