<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Quản lý kho thiết bị</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
        }

        /* Khối chứa chính */
        .inventory-card {
            background-color: #ffffff;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            border: none;
            margin-top: 2rem;
            margin-bottom: 3rem;
        }

        h1 {
            color: #2d3436;
            font-weight: 800;
            font-size: 32px;
            letter-spacing: -1px;
        }

        /* Nút bấm Gradient */
        .btn-custom {
            border-radius: 15px;
            padding: 10px 22px;
            font-weight: 700;
            transition: all 0.3s ease;
            border: none;
            color: white !important;
            display: inline-flex;
            align-items: center;
        }

        .btn-request {
            background: linear-gradient(135deg, #00cec9, #81ecec);
            box-shadow: 0 4px 15px rgba(0, 206, 201, 0.2);
        }

        .btn-add {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.2);
        }

        .btn-custom:hover {
            transform: translateY(-3px);
            filter: brightness(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        /* Bảng thiết kế lại */
        .table-container {
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #f1f3f5;
            margin-top: 25px;
        }

        .table {
            margin-bottom: 0;
        }

        .table thead th {
            background-color: #f8f9fa;
            color: #636e72;
            border: none;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.8px;
            padding: 20px;
        }

        .table tbody td {
            padding: 20px;
            vertical-align: middle;
            color: #2d3436;
            border-top: 1px solid #f1f3f5;
        }

        .table tbody tr:hover {
            background-color: #fcfcff;
        }

        /* Image preview trong bảng */
        .img-preview {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            border: 2px solid #fff;
        }

        /* Badge số lượng */
        .stock-badge {
            background-color: #ebfaf0;
            color: #00b894;
            padding: 6px 12px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
        }

        .btn-delete-soft {
            background-color: #fff0f0;
            color: #ff7675 !important;
            border-radius: 10px;
            font-weight: 600;
            padding: 6px 15px;
            border: none;
            transition: 0.3s;
        }

        .btn-delete-soft:hover {
            background-color: #ff7675;
            color: white !important;
        }

        .section-icon {
            color: #6c5ce7;
            margin-right: 12px;
        }
    </style>
</head>
<body>
<div layout:fragment="content" class="container">
    <div class="inventory-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="bi bi-box-seam-fill section-icon"></i>Kho Thiết Bị IT</h1>
            <div class="d-flex gap-2">
                <a th:href="@{/admin/dashboard}" class="btn btn-custom btn-request mr-2">
                    <i class="bi bi-card-checklist mr-2"></i> Yêu cầu mượn
                </a>
                <a th:href="@{/admin/add-page}" class="btn btn-custom btn-add">
                    <i class="bi bi-plus-lg mr-2"></i> Thêm thiết bị
                </a>
            </div>
        </div>

        <hr style="opacity: 0.05;">

        <div class="table-container shadow-sm">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th class="text-center">Ảnh</th>
                    <th>ID</th>
                    <th>Tên thiết bị</th>
                    <th>Loại</th>
                    <th>Tồn kho</th>
                    <th class="text-center">Hành động</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${items}">
                    <td class="text-center">
                        <img th:src="@{'/display-images/' + ${item.image != null ? item.image : 'default.png'}}"
                             alt="Equipment Image"
                             class="img-preview">
                    </td>
                    <td th:text="${item.id}" class="font-weight-bold text-muted"></td>
                    <td th:text="${item.name}" class="font-weight-bold"></td>
                    <td>
                        <span class="badge badge-light px-3 py-2" style="border-radius: 8px; color: #6c5ce7;" th:text="${item.type}"></span>
                    </td>
                    <td>
                        <span class="stock-badge" th:text="${item.stock}"></span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{'/admin/delete/' + ${item.id}}" class="btn btn-delete-soft"
                           onclick="return confirm('Xác nhận xóa thiết bị này khỏi kho?')">
                            <i class="bi bi-trash3 mr-1"></i> Xóa
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${items == null or items.isEmpty()}" class="text-center py-5">
            <i class="bi bi-search text-muted" style="font-size: 3rem; opacity: 0.2;"></i>
            <p class="text-muted mt-3">Kho trống, hãy thêm thiết bị mới!</p>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>
</html>
